name: PlatformIO Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -e ratputer_915

      - name: Merge single .bin for M5Burner
        run: |
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode dio --flash_size 8MB \
            -o ratcom-merged.bin \
            0x0000 .pio/build/ratputer_915/bootloader.bin \
            0x8000 .pio/build/ratputer_915/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/ratputer_915/firmware.bin

      - name: Package firmware ZIP
        run: |
          mkdir -p ratcom-firmware
          cp .pio/build/ratputer_915/bootloader.bin ratcom-firmware/
          cp .pio/build/ratputer_915/partitions.bin ratcom-firmware/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin ratcom-firmware/
          cp .pio/build/ratputer_915/firmware.bin ratcom-firmware/
          cp ratcom-merged.bin ratcom-firmware/
          cat > ratcom-firmware/manifest.json << 'MANIFEST'
          {
            "chipFamily": "ESP32-S3",
            "flashSize": "8MB",
            "flashMode": "dio",
            "flashFreq": "80m",
            "parts": [
              { "path": "bootloader.bin", "offset": "0x0000" },
              { "path": "partitions.bin", "offset": "0x8000" },
              { "path": "boot_app0.bin", "offset": "0xe000" },
              { "path": "firmware.bin", "offset": "0x10000" }
            ]
          }
          MANIFEST
          cd ratcom-firmware && zip -r ../ratcom-firmware.zip . && cd ..

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratcom-firmware
          path: |
            ratcom-firmware.zip
            ratcom-merged.bin

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -e ratputer_915

      - name: Merge single .bin for M5Burner
        run: |
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode dio --flash_size 8MB \
            -o ratcom-merged.bin \
            0x0000 .pio/build/ratputer_915/bootloader.bin \
            0x8000 .pio/build/ratputer_915/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/ratputer_915/firmware.bin

      - name: Package firmware ZIP
        run: |
          mkdir -p ratcom-firmware
          cp .pio/build/ratputer_915/bootloader.bin ratcom-firmware/
          cp .pio/build/ratputer_915/partitions.bin ratcom-firmware/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin ratcom-firmware/
          cp .pio/build/ratputer_915/firmware.bin ratcom-firmware/
          cp ratcom-merged.bin ratcom-firmware/
          cat > ratcom-firmware/manifest.json << 'MANIFEST'
          {
            "chipFamily": "ESP32-S3",
            "flashSize": "8MB",
            "flashMode": "dio",
            "flashFreq": "80m",
            "parts": [
              { "path": "bootloader.bin", "offset": "0x0000" },
              { "path": "partitions.bin", "offset": "0x8000" },
              { "path": "boot_app0.bin", "offset": "0xe000" },
              { "path": "firmware.bin", "offset": "0x10000" }
            ]
          }
          MANIFEST
          cd ratcom-firmware && zip -r ../ratcom-firmware.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ratcom-firmware.zip
            ratcom-merged.bin
          generate_release_notes: true
