name: PlatformIO Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -e ratputer_915

      - name: Create merged firmware binary
        run: |
          python3 -m esptool --chip esp32s3 merge_bin \
            --flash_mode dio \
            --flash_size 8MB \
            --flash_freq 80m \
            -o ratcom-firmware.bin \
            0x0000 .pio/build/ratputer_915/bootloader.bin \
            0x8000 .pio/build/ratputer_915/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/ratputer_915/firmware.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratcom-firmware
          path: ratcom-firmware.bin

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -e ratputer_915

      - name: Create merged firmware binary
        run: |
          python3 -m esptool --chip esp32s3 merge_bin \
            --flash_mode dio \
            --flash_size 8MB \
            --flash_freq 80m \
            -o ratcom-firmware.bin \
            0x0000 .pio/build/ratputer_915/bootloader.bin \
            0x8000 .pio/build/ratputer_915/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/ratputer_915/firmware.bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ratcom-firmware.bin
          generate_release_notes: true
