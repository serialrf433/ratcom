[env:ratputer_915]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 8MB
board_build.partitions = partitions_8MB_ota.csv
board_upload.flash_size = 8MB

build_flags =
    -std=gnu++17
    -fexceptions
    -DRATPUTER=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DRNS_USE_FS
    -DRNS_PERSIST_PATHS
    -DMSGPACK_USE_BOOST=OFF
    ; Cap all microReticulum internal tables to prevent heap exhaustion on ESP32
    -DRNS_KNOWN_DESTINATIONS_MAX=128
    -DRNS_HASHLIST_MAX=64
    -DRNS_RECEIPTS_MAX=8
    -DRNS_QUEUED_ANNOUNCES_MAX=8
    -DRNS_RANDOM_BLOBS_MAX=8
    -DRNS_RANDOM_BLOBS_PERSIST_MAX=4
    -DRNS_RATE_TIMESTAMPS_MAX=4
    -DRNS_PR_TAGS_MAX=8

build_unflags =
    -fno-exceptions
    -std=gnu++11

lib_deps =
    https://github.com/ratspeak/microReticulum.git#fix/tcp-transport-and-identity-persistence
    https://github.com/attermann/Crypto.git
    bblanchon/ArduinoJson@^7.4.2
    m5stack/M5Unified
    m5stack/M5GFX
    m5stack/M5Cardputer

extra_scripts = post:merge_firmware.py

monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool
